<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrintXero — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        /* ── PASTE YOUR SUPABASE KEYS HERE ── */
        /* See the <script> block at the bottom */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background: #f4efe6;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 60% at 20% 20%, rgba(212, 65, 12, .07) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 80% 80%, rgba(37, 99, 235, .05) 0%, transparent 60%);
            pointer-events: none;
        }

        .card {
            background: #fff;
            border-radius: 24px;
            border: 1px solid rgba(12, 12, 16, .1);
            box-shadow: 0 8px 40px rgba(12, 12, 16, .12);
            padding: 48px 44px;
            width: 90%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: fadeUp .5s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 22px;
            letter-spacing: -.5px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-chip {
            background: #d4410c;
            color: #fff;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 12px;
        }

        .tagline {
            font-size: 13px;
            color: #6e6a63;
            margin-bottom: 36px;
        }

        .tab-row {
            display: flex;
            gap: 4px;
            background: #f4efe6;
            padding: 4px;
            border-radius: 12px;
            border: 1px solid rgba(12, 12, 16, .1);
            margin-bottom: 28px;
        }

        .tab {
            flex: 1;
            padding: 8px;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #6e6a63;
            transition: all .2s;
            font-family: 'DM Sans', sans-serif;
        }

        .tab.active {
            background: #fff;
            color: #0c0c10;
            box-shadow: 0 1px 6px rgba(0, 0, 0, .1);
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .5px;
            text-transform: uppercase;
            color: #6e6a63;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid rgba(12, 12, 16, .1);
            border-radius: 10px;
            background: #f4efe6;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: #0c0c10;
            transition: border-color .2s;
        }

        .field input:focus {
            outline: none;
            border-color: #d4410c;
        }

        .submit {
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            background: #0c0c10;
            color: #fff;
            border: none;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Syne', sans-serif;
            cursor: pointer;
            transition: all .22s;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit:hover {
            background: #d4410c;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(212, 65, 12, .3);
        }

        .submit:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .spin {
            width: 15px;
            height: 15px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: none;
        }

        .submit.loading .spin {
            display: block;
        }

        .submit.loading .btn-txt {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .err {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-top: 14px;
            display: none;
        }

        .err.show {
            display: block;
        }

        .ok {
            background: #dcfce7;
            color: #15803d;
            border: 1px solid #86efac;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-top: 14px;
            display: none;
        }

        .ok.show {
            display: block;
        }

        .divider {
            text-align: center;
            font-size: 12px;
            color: #6e6a63;
            margin: 20px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(12, 12, 16, .1);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .google-btn {
            width: 100%;
            padding: 11px;
            border-radius: 10px;
            background: #fff;
            border: 1.5px solid rgba(12, 12, 16, .12);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            color: #0c0c10;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .google-btn:hover {
            border-color: #d4410c;
            background: #fff8f6;
        }

        .footer-note {
            font-size: 11px;
            color: #6e6a63;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">PrintXero <span class="logo-chip">XEROX</span></div>
        <div class="tagline">Your neighbourhood print service — now online.</div>

        <!-- Tab: Login / Sign up -->
        <div class="tab-row">
            <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
            <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
        </div>

        <!-- Email -->
        <div class="field">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        </div>

        <!-- Password -->
        <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <!-- Name (signup only) -->
        <div class="field" id="name-field" style="display:none;">
            <label>Full Name</label>
            <input type="text" id="fullname" placeholder="Bhagwat Sharma" />
        </div>

        <button class="submit" id="submit-btn" onclick="handleAuth()">
            <div class="spin"></div>
            <span class="btn-txt" id="btn-label">Sign In →</span>
        </button>

        <div class="err" id="err-box"></div>
        <div class="ok" id="ok-box"></div>

        <div class="divider">or</div>
        <button class="google-btn" onclick="signInGoogle()">
            <svg width="16" height="16" viewBox="0 0 24 24">
                <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4" />
                <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853" />
                <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                    fill="#FBBC05" />
                <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335" />
            </svg>
            Continue with Google
        </button>

        <div class="footer-note">
            Shopkeeper? Your account will be upgraded by the admin.
        </div>
    </div>

    <script>
        // ════════════════════════════════════════
        // ⚙️  PASTE YOUR SUPABASE KEYS HERE
        // ════════════════════════════════════════
        var SUPABASE_URL = 'https://nyoergouyiazkqhvftcc.supabase.co';
        var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55b2VyZ291eWlhemtxaHZmdGNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDA5NDAsImV4cCI6MjA5MDM3Njk0MH0.rHL6RQBdRlmuPgRdRqjpTJ5xkyPIIiubhR6GkHrVUGA';
        // ════════════════════════════════════════

        var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        var mode = 'login'; // 'login' or 'signup'

        // ── On page load: if already logged in, redirect immediately ──
        window.addEventListener('load', async function () {
            var session = await sb.auth.getSession();
            if (session.data.session) redirectByRole(session.data.session.user.id);
        });

        function switchTab(tab) {
            mode = tab;
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
            document.getElementById('name-field').style.display = tab === 'signup' ? 'block' : 'none';
            document.getElementById('btn-label').textContent = tab === 'login' ? 'Sign In →' : 'Create Account →';
            document.getElementById('password').autocomplete = tab === 'login' ? 'current-password' : 'new-password';
            hideMessages();
        }

        async function handleAuth() {
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            hideMessages();

            if (!email || !password) { showErr('Please fill in email and password.'); return; }

            setLoading(true);

            if (mode === 'login') {
                var { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) { showErr(error.message); setLoading(false); return; }
                redirectByRole(data.user.id);

            } else {
                var name = document.getElementById('fullname').value.trim();
                var { data, error } = await sb.auth.signUp({
                    email, password,
                    options: { data: { full_name: name } }
                });
                if (error) { showErr(error.message); setLoading(false); return; }
                showOk('Account created! Check your email to confirm, then sign in.');
                setLoading(false);
            }
        }

        async function signInGoogle() {
            var { error } = await sb.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.href }
            });
            if (error) showErr(error.message);
        }

        // ── Fetch role from profiles table → redirect to correct page ──
        async function redirectByRole(userId) {
            var { data, error } = await sb.from('profiles').select('role').eq('id', userId).single();
            if (error || !data) {
                // Profile might not exist yet (race condition on signup) — default to customer
                window.location.href = 'customer.html';
                return;
            }
            if (data.role === 'shopkeeper') {
                window.location.href = 'shopkeeper.html';
            } else {
                window.location.href = 'customer.html';
            }
        }

        function setLoading(on) {
            var btn = document.getElementById('submit-btn');
            btn.classList.toggle('loading', on);
            btn.disabled = on;
        }
        function showErr(msg) {
            var el = document.getElementById('err-box');
            el.textContent = '❌ ' + msg;
            el.classList.add('show');
        }
        function showOk(msg) {
            var el = document.getElementById('ok-box');
            el.textContent = '✅ ' + msg;
            el.classList.add('show');
        }
        function hideMessages() {
            document.getElementById('err-box').classList.remove('show');
            document.getElementById('ok-box').classList.remove('show');
        }

        // Listen for Enter key
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') handleAuth();
        });
    </script>
</body>

</html>
